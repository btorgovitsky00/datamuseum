url: https://btorgovitsky00.github.io/datamuseum

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#0054AD"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, ames, github]
  components:
    intro:
      text: Get Started
      href: articles/datamuseum.html
    news:
      text: News
      href: news/index.html
    ames:
      text: ""
      href: https://cherylames.com
    github:
      icon: fa-github
      href: https://github.com/btorgovitsky00/datamuseum

figures:
  dev: ragg::agg_png
  dpi: 300

articles:
  - title: Example Workflows
    desc: In-depth workflows demonstrating datamuseum functions with real datasets.
    navbar: Example Workflows
    contents:
      - octopodoidea_japan

  - title: ~
    navbar: Publications
    contents:
      - publications

reference:
  - title: latlong
    desc: Functions for managing latitude and longitude data.
    contents:
      - latlong_column
      - latlong_convert
      - latlong_combine
      - latlong_filter
      - latlong_format
      - latlong_limits
      - latlong_hemisphere
      - latlong_range
      - latlong_region
      - latlong_split

  - title: taxon
    desc: Functions for managing taxonomic data.
    contents:
      - taxon_add
      - taxon_cite
      - taxon_cleaner
      - taxon_column
      - taxon_combine
      - taxon_rank
      - taxon_spellcheck
      - taxon_split
      - taxon_sort
      - taxon_validate

  - title: Utilities
    desc: General-purpose functions for data set management.
    contents:
      - deduplicate
      - duplicate
      - italicize

  - title: Example Data
    desc: Octopodoidea occurrence datasets for Japan compiled from five
      museum and biodiversity sources, then compiled and refined with
      taxon functions.
    contents:
      - GBIF_Japan
      - InvBase_Japan
      - BISMAL_Japan
      - OBIS_Japan
      - NSMT_Japan
      - museum
      - museum_taxon
